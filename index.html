<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tra cứu thẻ Panini</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="lookup-panel" aria-labelledby="pageTitle">
        <div class="brand-bar">
          <div>
            <p class="eyebrow">Card checklist</p>
            <h1 id="pageTitle">Tra cứu thẻ Panini</h1>
          </div>
          <a class="shop-link" href="https://shopee.vn/fcmvn_com" target="_blank" rel="noopener">Shopee</a>
        </div>

        <div class="controls" aria-label="Bộ lọc tra cứu">
          <label class="field season-field">
            <span>Mùa thẻ</span>
            <select id="seasonSelect"></select>
          </label>

          <label class="field search-field">
            <span>Tìm kiếm</span>
            <input id="searchInput" type="search" placeholder="Số thẻ hoặc tên">
          </label>

          <label class="toggle-field">
            <input id="stockOnly" type="checkbox">
            <span id="ownedOnlyLabel">Có hàng</span>
          </label>
        </div>

        <div class="summary-row">
          <p id="resultSummary">Đang tải dữ liệu</p>
          <button class="ghost-button" id="clearFilters" type="button">Xóa lọc</button>
        </div>
      </section>

      <section class="card-list" id="cardList" aria-live="polite"></section>
      <section class="empty-state" id="emptyState" hidden>
        <h2>Không tìm thấy thẻ phù hợp</h2>
        <p>Thử đổi mùa thẻ hoặc từ khóa tìm kiếm.</p>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card-item">
        <div class="card-image-wrap">
          <img class="card-image" alt="" loading="lazy">
        </div>
        <div class="card-content">
          <div class="card-topline">
            <span class="card-code"></span>
            <span class="rarity-pill"></span>
          </div>
          <h2 class="card-name"></h2>
          <div class="rarity-line">
            <span class="rarity-label">Rarity</span>
            <span class="rarity-text"></span>
          </div>
          <div class="card-meta">
            <span class="card-status"></span>
            <span class="stock-value"></span>
          </div>
          <div class="movement-row">
            <span class="movement-value"></span>
          </div>
          <a class="buy-link" href="#" target="_blank" rel="noopener">Mua trên Shopee</a>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
